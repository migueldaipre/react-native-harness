name: React Native Harness for Web
description: '[Deprecated] Use callstackincubator/react-native-harness instead. Run React Native Harness tests on Web'
inputs:
  runner:
    description: The runner to use
    required: true
    type: string
  projectRoot:
    description: The project root directory
    required: false
    type: string
  uploadVisualTestArtifacts:
    description: Whether to upload visual test diff and actual images as artifacts
    required: false
    type: boolean
    default: 'true'
  harnessArgs:
    description: Additional arguments to pass to the Harness CLI
    required: false
    type: string
    default: ''
  preRunHook:
    description: Shell script to run in bash immediately before Harness starts
    required: false
    type: string
    default: ''
  afterRunHook:
    description: Shell script to run in bash immediately after Harness finishes
    required: false
    type: string
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Load React Native Harness configuration
      id: load-config
      shell: bash
      env:
        INPUT_RUNNER: ${{ inputs.runner }}
        INPUT_PROJECTROOT: ${{ inputs.projectRoot }}
      run: |
        node ${{ github.action_path }}/../shared/index.cjs
    - name: Install Playwright Browsers
      shell: bash
      run: npx playwright install --with-deps chromium
    - name: Detect Package Manager
      id: detect-pm
      shell: bash
      run: |
        if [ -f "pnpm-lock.yaml" ]; then
          echo "manager=pnpm" >> $GITHUB_OUTPUT
          echo "runner=pnpm exec " >> $GITHUB_OUTPUT
        elif [ -f "yarn.lock" ]; then
          echo "manager=yarn" >> $GITHUB_OUTPUT
          echo "runner=yarn " >> $GITHUB_OUTPUT
        elif [ -f "bun.lock" ] || [ -f "bun.lockb" ]; then
          echo "manager=bun" >> $GITHUB_OUTPUT
          echo "runner=bunx " >> $GITHUB_OUTPUT
        elif [ -f "deno.lock" ]; then
          echo "manager=deno" >> $GITHUB_OUTPUT
          echo "runner=deno run -A npm:" >> $GITHUB_OUTPUT
        else
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "runner=npx " >> $GITHUB_OUTPUT
        fi
    - name: Run E2E tests
      id: run-tests
      shell: bash
      working-directory: ${{ inputs.projectRoot }}
      env:
        PRE_RUN_HOOK: ${{ inputs.preRunHook }}
        AFTER_RUN_HOOK: ${{ inputs.afterRunHook }}
        HARNESS_RUNNER: ${{ inputs.runner }}
      run: |
        export HARNESS_PROJECT_ROOT="$PWD"

        if [ -n "$PRE_RUN_HOOK" ]; then
          pre_hook_file="$(mktemp "${RUNNER_TEMP:-/tmp}/harness-pre-run.XXXXXX.sh")"
          trap 'rm -f "$pre_hook_file"' EXIT
          printf '%s\n' "$PRE_RUN_HOOK" > "$pre_hook_file"
          chmod +x "$pre_hook_file"
          bash "$pre_hook_file"
          rm -f "$pre_hook_file"
          trap - EXIT
        fi

        set +e
        ${{ steps.detect-pm.outputs.runner }}react-native-harness --harnessRunner ${{ inputs.runner }} ${{ inputs.harnessArgs }}
        harness_exit_code=$?
        set -e

        export HARNESS_EXIT_CODE="$harness_exit_code"
        after_run_exit_code=0
        if [ -n "$AFTER_RUN_HOOK" ]; then
          after_hook_file="$(mktemp "${RUNNER_TEMP:-/tmp}/harness-after-run.XXXXXX.sh")"
          trap 'rm -f "$after_hook_file"' EXIT
          printf '%s\n' "$AFTER_RUN_HOOK" > "$after_hook_file"
          chmod +x "$after_hook_file"
          set +e
          bash "$after_hook_file"
          after_run_exit_code=$?
          set -e
          rm -f "$after_hook_file"
          trap - EXIT
        fi

        echo "harness_exit_code=$harness_exit_code" >> "$GITHUB_OUTPUT"

        if [ "$harness_exit_code" -ne 0 ]; then
          exit "$harness_exit_code"
        fi

        if [ "$after_run_exit_code" -ne 0 ]; then
          exit "$after_run_exit_code"
        fi
    - name: Upload visual test artifacts
      if: always() && inputs.uploadVisualTestArtifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: visual-test-diffs-chromium
        path: |
          ${{ inputs.projectRoot }}/**/__image_snapshots__/**/*-diff.png
          ${{ inputs.projectRoot }}/**/__image_snapshots__/**/*-actual.png
        if-no-files-found: ignore
    - name: Upload crash report artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: harness-crash-reports-web
        path: ${{ inputs.projectRoot }}/.harness/crash-reports/**/*
        if-no-files-found: ignore
